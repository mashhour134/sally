# Codemagic CI/CD configuration for "Air Guard" (Capacitor React App)
# For more details, visit: https://docs.codemagic.io

workflows:
  android-workflow:
    name: Air Guard Android Build (Free Tier)
    max_build_duration: 60
    instance_type: mac_mini_m1 # macOS instance to support Xcode/Android, or use standard Linux
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install Node.js Dependencies
        script: |
          npm ci || npm install
      - name: Build React Web Assets
        script: |
          npm run build
      - name: Add Android Platform (if missing) and Sync
        script: |
          # Install OpenJDK 21 via Homebrew to support Capacitor Android compilations
          echo "Installing Java 21..."
          brew install openjdk@21
          sudo ln -sfn /opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk /Library/Java/JavaVirtualMachines/openjdk-21.jdk
          export PATH="/opt/homebrew/opt/openjdk@21/bin:$PATH"
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || echo $JAVA_HOME)
          echo "Using Java Home: $JAVA_HOME"
          java -version

          # Checks if Android folder exists, if not adds it
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
      - name: Build Android APK (Debug Version)
        script: |
          # Use JDK 21 compatibility during gradle compilation
          export PATH="/opt/homebrew/opt/openjdk@21/bin:$PATH"
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || echo $JAVA_HOME)
          echo "Using Java Home: $JAVA_HOME"
          java -version
          cd android
          ./gradlew assembleDebug -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  ios-workflow:
    name: Air Guard iOS Simulator Build (Free Tier - Safe without Apple Account)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install Node.js Dependencies
        script: |
          npm ci || npm install
      - name: Build React Web Assets
        script: |
          npm run build
      - name: Add iOS Platform and Sync
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: Build iOS Simulator App (No Code Signing Required)
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
    artifacts:
      - ios/App/build/Release-iphonesimulator/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
