# Codemagic CI/CD configuration for "Air Guard" (Capacitor React App)
# For more details, visit: https://docs.codemagic.io

workflows:
  android-workflow:
    name: Air Guard Android Build (Free Tier)
    max_build_duration: 60
    instance_type: mac_mini_m1 # macOS instance to support Xcode/Android, or use standard Linux
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install Node.js Dependencies
        script: |
          npm ci || npm install
      - name: Build React Web Assets
        script: |
          npm run build
      - name: Add Android Platform (if missing) and Sync
        script: |
          # Set JDK 21 for Java 21 compatibility during CLI commands and task sync
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 17 2>/dev/null || echo $JAVA_HOME)
          echo "Using Java Home: $JAVA_HOME"
          # Checks if Android folder exists, if not adds it
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
      - name: Build Android APK (Debug Version)
        script: |
          # Set JDK 21 for Java 21 compilation compatibility
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 17 2>/dev/null || echo $JAVA_HOME)
          echo "Using Java Home: $JAVA_HOME"
          java -version
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  ios-workflow:
    name: Air Guard iOS Simulator Build (Free Tier - Safe without Apple Account)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install Node.js Dependencies
        script: |
          npm ci || npm install
      - name: Build React Web Assets
        script: |
          npm run build
      - name: Add iOS Platform (if missing) and Sync
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Install Cocoapods
        script: |
          cd ios/App && pod install
      - name: Build iOS Simulator App (No Code Signing Required)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
    artifacts:
      - ios/App/build/Release-iphonesimulator/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
